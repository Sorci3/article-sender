name: Article allemand quotidien

on:
  schedule:
    - cron: "0 6 * * *"   # 6h UTC = 7h/8h en Allemagne selon saison
  workflow_dispatch:        # bouton "Run workflow" pour tester a la main

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python send.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
